name: Sync CITATION

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update_citation:
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest

      - name: Update CITATION.cff from pyproject.toml
        run: uvx cff-from-621

      - name: Commit and push the updated CITATION.cff file
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update CITATION.cff from pyproject.toml'
          file_pattern: 'CITATION.cff'